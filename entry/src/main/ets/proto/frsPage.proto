// 贴吧 FrsPage 极简 proto 定义（issue #6）
// 字段编号严格对齐 tbclient.protobuf-main/proto/ 原定义
// 仅保留 tieba-harmony 需要的核心字段；服务端响应中的未知字段会被 protobuf 自动跳过
syntax = "proto3";

package tieba.frsPage;

// 公共请求参数（对应 CommonReq.proto，仅保留 harmony 端需要的字段）
message CommonReq {
  int32 _client_type = 1;
  string _client_version = 2;
  string cuid = 7;
  string BDUSS = 10;
  string tbs = 11;
  string cuid_galaxy2 = 32;
}

// FrsPage 请求体（对应 FrsPageReqIdl.proto）
message FrsPageReqIdl {
  message DataReq {
    CommonReq common = 39;
    string kw = 1;
    int32 rn = 2;
    int32 rn_need = 3;
    int32 is_good = 4;
    int32 pn = 15;
    int32 sort_type = 47;
  }
  DataReq data = 1;
}

// 错误信息（对应 Error.proto）
message Error {
  int32 errorno = 1;
  string errmsg = 2;
}

// 分页信息（对应 Page.proto，仅保留核心字段）
message Page {
  int32 page_size = 1;
  int32 current_page = 3;
  int32 total_count = 4;
  int32 total_page = 5;
  int32 has_more = 6;
  int32 has_prev = 7;
}

// 媒体信息（对应 Media.proto，仅保留图片相关字段）
message Media {
  int32 type = 1;
  string small_pic = 2;
  string big_pic = 3;
  string src_pic = 8;
  uint32 width = 10;
  uint32 height = 11;
  string origin_pic = 15;
}

// 摘要碎片（对应 Abstract.proto）
message Abstract {
  int32 type = 1;
  string text = 2;
}

// 用户信息（对应 User.proto，仅保留核心字段）
message User {
  int64 id = 2;
  string name = 3;
  string name_show = 4;
  string portrait = 5;
  int32 level_id = 23;
  int32 is_bawu = 25;
  int32 gender = 42;
}

// 主题帖信息（对应 ThreadInfo.proto，仅保留核心字段）
message ThreadInfo {
  int64 id = 1;
  int64 tid = 2;
  string title = 3;
  int32 reply_num = 4;
  int32 view_num = 5;
  int32 is_top = 9;
  int32 is_good = 10;
  repeated Abstract _abstract = 21;
  repeated Media media = 22;
  int64 first_post_id = 40;
  int32 create_time = 45;
  int64 author_id = 56;
}

// FrsPage 响应体（对应 FrsPageResIdl.proto）
message FrsPageResIdl {
  Error error = 1;

  message DataRes {
    message ForumInfo {
      int64 id = 1;
      string name = 2;
    }
    ForumInfo forum = 2;
    Page page = 4;
    repeated ThreadInfo thread_list = 7;
    repeated User user_list = 17;
  }
  DataRes data = 2;
}
